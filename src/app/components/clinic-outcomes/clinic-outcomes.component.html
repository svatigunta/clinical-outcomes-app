<div class="container mt-4">
    <h1>Clinic Outcomes</h1>

    <div class="btn-group mb-3" role="group" aria-label="Time period selection">
        <button type="button" class="btn btn-outline-primary" (click)="onDaysSelected(30)"
            [class.active]="selectedDays === 30">30 days</button>
        <button type="button" class="btn btn-outline-primary" (click)="onDaysSelected(60)"
            [class.active]="selectedDays === 60">60 days</button>
        <button type="button" class="btn btn-outline-primary" (click)="onDaysSelected(90)"
            [class.active]="selectedDays === 90">90 days</button>
    </div>


    @let data = clinicOutcomesData$ | async;
    @if (data) {
        <div class="alert alert-info" role="alert">
            Showing {{data.patientCount}} patients from last {{selectedDays}} days of available data from
            {{ data.startDate }} - {{ data.endDate }}. Last updated on {{ data.lastUpdated }}
        </div>
    }


    <div class="row mt-4">
        <div class="col-md-6">
            <app-time-in-range-chart></app-time-in-range-chart>
        </div>
        <div class="col-md-6">
            <app-gmi-chart></app-gmi-chart>
        </div>
    </div>


    <button class="btn btn-primary mt-3" (click)="printPage()">Print</button>
</div>
