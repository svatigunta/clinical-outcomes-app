<div class="card">
  <div class="card-body">
    <h5 class="card-title">Time in range</h5>
    <ngx-charts-bar-vertical
      [results]="chartData"
      [yAxis]="showYAxis"
      [xAxis]="showXAxis"
      [yAxisLabel]="yAxisLabel"
      [xAxisLabel]="xAxisLabel"
      [showXAxisLabel]="true"
      [showYAxisLabel]="true"
    >
    </ngx-charts-bar-vertical>
  </div>
</div>
